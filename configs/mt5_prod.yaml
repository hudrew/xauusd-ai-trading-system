state_thresholds:
  breakout_distance_min: 0.18
  trend_ema_spread_min: 0.35
  ema_slope_min: 0.08
  volatility_ratio_min: 1.15
  breakout_false_break_max: 2
  trend_timeframe_alignment_min: 2
  pullback_depth_min: 0.10
  pullback_depth_max: 0.55
  range_ema_spread_max: 0.12
  range_ema_slope_max: 0.04
  range_volatility_max: 1.05
  range_false_break_min: 2
  range_boundary_touch_min: 2
  range_timeframe_bias_max: 1
  spread_ratio_max: 1.45
  volatility_floor: 0.70
  conflict_score_max: 0.45

risk:
  max_single_trade_risk_pct: 0.002
  max_daily_loss_pct: 0.010
  max_consecutive_losses: 2
  max_open_positions: 1
  max_spread_ratio: 1.35
  protective_drawdown_pct: 0.04
  contract_size: 100.0
  partial_alignment_scale: 0.70

breakout:
  entry_mode: "retest"
  stop_loss_atr_multiplier: 1.30
  take_profit_rr: 2.00
  partial_take_profit_rr: 1.00
  max_hold_bars: 20
  require_retest_confirmation: true

pullback:
  stop_loss_atr_multiplier: 1.15
  take_profit_rr: 1.80
  max_reference_distance_atr: 1.25
  require_m1_reversal_confirmation: true
  max_hold_bars: 16

mean_reversion:
  lower_range_position: 0.15
  upper_range_position: 0.85
  stop_loss_atr_multiplier: 1.10
  take_profit_rr: 1.50
  midline_target_weight: 1.00
  max_hold_bars: 12

volatility_monitor:
  horizons_minutes: [5, 15, 30]
  atr_expansion_trigger: 1.18
  spread_ratio_trigger: 1.18
  tick_speed_trigger: 1.10
  breakout_pressure_trigger: 0.20
  news_proximity_minutes: 30
  warning_score_min: 0.55
  critical_score_min: 0.78
  warning_position_scale: 0.40
  info_position_scale: 0.75
  block_on_critical: true

backtest:
  initial_cash: 10000.0
  commission: 0.0
  slippage_perc: 0.0
  slippage_fixed: 0.0

acceptance:
  min_total_net_pnl: 0.0
  min_total_profit_factor: 1.15
  max_total_drawdown_pct: 0.06
  min_out_of_sample_net_pnl: 0.0
  min_out_of_sample_profit_factor: 1.0
  max_out_of_sample_drawdown_pct: 0.06
  min_walk_forward_windows: 4
  min_walk_forward_positive_window_rate: 0.60
  max_close_month_profit_concentration: 0.65
  max_session_profit_concentration: 0.75

report_archive:
  enabled: true
  base_dir: "reports/research"
  write_latest: true

deployment_gate:
  require_acceptance_report: true
  max_acceptance_report_age_hours: 72.0
  require_host_check_on_live: true
  require_preflight_on_live: true

database:
  url: "sqlite:///var/xauusd_ai/prod.db"
  auto_create: true

notification:
  enabled: true
  channel: "webhook"
  webhook_url: null
  min_warning_level: "warning"
  timeout_seconds: 5.0

runtime:
  environment: "prod"
  service_name: "xauusd-ai-prod"
  log_level: "INFO"
  heartbeat_interval_seconds: 30
  poll_interval_seconds: 5
  starting_equity: 10000.0
  dry_run: false

market_data:
  platform: "mt5"
  symbol: "XAUUSD"
  mt5:
    enabled: true
    login: null
    password: null
    server: "TradeMaxGlobal-Live"
    path: null
    symbol: "XAUUSD"
    timeframe: "M1"
    history_bars: 600

execution:
  platform: "mt5"
  symbol: "XAUUSD"
  order_comment_prefix: "xauusd-ai-prod"
  mt5:
    enabled: true
    login: null
    password: null
    server: "TradeMaxGlobal-Live"
    path: null
    symbol: "XAUUSD"
    deviation: 30
    magic: 2026032902
